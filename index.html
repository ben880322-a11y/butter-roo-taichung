<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Butter Roo | 奶油袋鼠漢口店</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --p: #FFB74D; --s: #E65100; --bg: #FFFBF5; }
        body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg); margin: 0; padding-bottom: 50px; }
        nav { position: fixed; top: 0; width: 100%; height: 60px; background: white; display: flex; align-items: center; padding: 0 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); z-index: 1000; box-sizing: border-box; }
        .logo { font-weight: bold; color: var(--s); font-size: 1.2rem; margin-left: 15px; }
        .hero { height: 150px; background: var(--p); color: white; display: flex; align-items: center; justify-content: center; margin-top: 60px; text-align: center; }
        .container { max-width: 1000px; margin: auto; padding: 20px; }
        .title { border-left: 5px solid var(--p); padding-left: 10px; margin: 30px 0 20px; color: var(--s); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        .card { background: white; border-radius: 10px; overflow: hidden; border: 1px solid #eee; display: flex; flex-direction: column; }
        .img { width: 100%; height: 150px; object-fit: cover; background: #eee; }
        .info { padding: 10px; text-align: center; flex-grow: 1; }
        .name { font-weight: bold; font-size: 1rem; margin-bottom: 5px; min-height: 2.5em; }
        .price { color: var(--s); font-weight: bold; margin-bottom: 10px; }
        .btn { background: var(--p); color: white; border: none; padding: 8px; width: 100%; border-radius: 5px; cursor: pointer; }
        .cart { background: white; padding: 20px; border-radius: 10px; margin-top: 40px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .input { width: 100%; padding: 10px; margin: 5px 0; box-sizing: border-box; border: 1px solid #ddd; border-radius: 5px; }
        .line-btn { background: #06C755; color: white; border: none; width: 100%; padding: 15px; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 15px; }
    </style>
</head>
<body>

    <nav>
        <i class="fas fa-bars" style="font-size:1.5rem; color:orange;"></i>
        <div class="logo">BUTTER ROO TAICHUNG</div>
    </nav>

    <div class="hero">
        <div><h2 style="margin:0;">奶油袋鼠 漢口店</h2><p style="margin:5px 0 0;">21款現烤美味</p></div>
    </div>

    <div class="container">
        <h3 class="title">人氣泡芙系列</h3>
        <div class="grid" id="g1"></div>

        <h3 class="title">精緻甜點與可頌</h3>
        <div class="grid" id="g2"></div>

        <h3 class="title">咖啡系列</h3>
        <div class="grid" id="g3"></div>

        <div class="cart" id="cart">
            <h3>預訂清單</h3>
            <div id="cart-list">尚未選擇。</div>
            <p style="text-align:right;">總計: NT$ <span id="total">0</span></p>
            <input type="text" id="user" class="input" placeholder="姓名">
            <input type="tel" id="tel" class="input" placeholder="電話">
            <button class="line-btn" onclick="send()">傳送預訂至 LINE</button>
        </div>
    </div>

    <script>
        const data = [
            { c: 1, n: "生乳卡士達", p: 60, i: "1.jpg" },
            { c: 1, n: "草莓卡士達", p: 95, i: "2.jpg" },
            { c: 1, n: "法芙娜可可", p: 70, i: "3.jpg" },
            { c: 1, n: "白葡萄卡士達", p: 90, i: "4.jpg" },
            { c: 1, n: "靜岡濃抹茶", p: 75, i: "5.jpg" },
            { c: 1, n: "砂糖橘卡士達", p: 85, i: "6.jpg" },
            { c: 1, n: "提拉米蘇", p: 120, i: "7.jpg" },
            { c: 1, n: "雲朵山竹", p: 110, i: "8.jpg" },
            { c: 1, n: "重乳酪炙燒起司", p: 100, i: "9.jpg" },
            { c: 1, n: "貓山王榴槤", p: 120, i: "10.jpg" },
            { c: 1, n: "酸甜檸檬乳酪", p: 95, i: "11.jpg" },
            { c: 1, n: "酪梨尬布丁", p: 90, i: "12.jpg" },
            { c: 1, n: "肉鬆鹹蛋黃乳酪", p: 90, i: "13.jpg" },
            { c: 1, n: "酸溜溜檸檬", p: 85, i: "14.jpg" },
            { c: 2, n: "mini小泡芙招牌波羅", p: 150, i: "15.jpg" },
            { c: 2, n: "mini小泡芙經典日式", p: 140, i: "16.jpg" },
            { c: 2, n: "蜜糖可頌", p: 55, i: "17.jpg" },
            { c: 2, n: "蛋塔可頌", p: 65, i: "18.jpg" },
            { c: 3, n: "美式咖啡(冰/熱)", p: 65, i: "19.jpg" },
            { c: 3, n: "拿鐵咖啡(冰/熱)", p: 85, i: "20.jpg" },
            { c: 3, n: "阿芙佳朵(冰)", p: 110, i: "21.jpg" }
        ];

        let cart = [];

        function render() {
            data.forEach((d, idx) => {
                const g = document.getElementById('g' + d.c);
                if(g) {
                    g.innerHTML += `
                        <div class="card">
                            <img src="${d.i}" class="img" onerror="this.src='https://via.placeholder.com/200x150?text=ButterRoo'">
                            <div class="info">
                                <div class="name">${d.n}</div>
                                <div class="price">$${d.p}</div>
                                <button class="btn" onclick="add(${idx})">加入清單</button>
                            </div>
                        </div>`;
                }
            });
        }

        function add(idx) {
            const item = data[idx];
            const has = cart.find(x => x.n === item.n);
            if(has) has.q++;
            else cart.push({ n: item.n, p: item.p, q: 1 });
            update();
        }

        function update() {
            const l = document.getElementById('cart-list');
            const t = document.getElementById('total');
            if(cart.length === 0) { l.innerHTML = "尚未選擇。"; t.innerText = "0"; return; }
            l.innerHTML = cart.map((x, i) => `
                <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                    <span>${x.n} x ${x.q}</span>
                    <span>$${x.p * x.q} <i class="fas fa-trash" onclick="rem(${i})" style="color:#ccc;cursor:pointer;"></i></span>
                </div>`).join('');
            t.innerText = cart.reduce((s, x) => s + (x.p * x.q), 0);
        }

        function rem(i) { cart.splice(i, 1); update(); }

        function send() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('tel').value;
            if(!u || !p || cart.length === 0) return alert("請填寫姓名、電話並選擇品項");
            let m = `【Butter Roo 預訂】\n姓名：${u}\n電話：${p}\n\n`;
            cart.forEach(x => m += `▪️ ${x.n} x ${x.q}\n`);
            m += `\n總計：NT$ ${document.getElementById('total').innerText}`;
            window.location.href = `https://line.me/R/oaMessage/@069pytqk/?${encodeURIComponent(m)}`;
        }

        window.onload = render;
    </script>
</body>
</html>
