<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Butter Roo | 奶油袋鼠訂餐系統</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --p: #FFB74D; --s: #E65100; --bg: #FFFBF5; }
        body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg); margin: 0; padding-bottom: 20px; }
        nav { position: fixed; top: 0; width: 100%; height: 60px; background: white; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); z-index: 1000; }
        .logo { font-weight: bold; color: var(--s); font-size: 1.4rem; letter-spacing: 2px; }
        
        .hero { height: 160px; background: var(--p); color: white; display: flex; align-items: center; justify-content: center; margin-top: 60px; text-align: center; }
        .container { max-width: 1000px; margin: auto; padding: 20px; }
        
        /* 區塊大標題 */
        .section-header { color: var(--s); border-bottom: 3px solid var(--p); padding-bottom: 10px; margin: 40px 0 20px; font-size: 1.8rem; }
        .title { border-left: 5px solid var(--p); padding-left: 10px; margin: 30px 0 20px; color: #555; font-size: 1.3rem;}
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        .card { background: white; border-radius: 12px; overflow: hidden; border: 1px solid #f0f0f0; display: flex; flex-direction: column; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        .card.gift-card { border: 2px solid var(--p); box-shadow: 0 5px 15px rgba(255, 183, 77, 0.3); } /* 禮盒專屬高亮邊框 */
        
        .img { width: 100%; height: 160px; object-fit: cover; background: #fafafa; }
        .info { padding: 15px; display: flex; flex-direction: column; flex-grow: 1; }
        
        .action-row { display: flex; gap: 10px; margin-top: auto; }
        .qty-input { width: 60px; padding: 10px; border: 1px solid #ddd; border-radius: 8px; text-align: center; font-size: 1rem; box-sizing: border-box; }
        .add-btn { flex-grow: 1; background: var(--p); color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1rem; transition: 0.2s; }
        .add-btn:hover { background: var(--s); }
        
        /* 禮盒口味下拉選單 */
        .box-select { width: 100%; padding: 8px; margin-bottom: 6px; border: 1px solid #ddd; border-radius: 5px; font-size: 0.95rem; background: #fff; color: #333; }
        
        .cart { background: white; padding: 25px; border-radius: 15px; margin-top: 50px; box-shadow: 0 5px 20px rgba(0,0,0,0.08); border-top: 6px solid var(--p); }
        .input { width: 100%; padding: 14px; margin-bottom: 15px; box-sizing: border-box; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; }
        .form-label { font-weight: bold; margin-bottom: 5px; display: block; color: #444; }
        .line-btn { background: #06C755; color: white; border: none; width: 100%; padding: 18px; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1.2rem; display: flex; justify-content: center; align-items: center; gap: 10px; }
        
        .footer { text-align: center; padding: 30px 20px; margin-top: 40px; color: #999; font-size: 0.9rem; border-top: 1px solid #eee; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">BUTTER ROO</div>
    </nav>

    <div class="hero">
        <div>
            <h1 style="margin:0; font-size: 2rem;">奶油袋鼠 漢口店</h1>
            <p style="margin:10px 0 0; font-size: 1.1rem; letter-spacing: 1px;">DAILY FRESH BAKED PUFFS</p>
        </div>
    </div>

    <div class="container">
        
        <h2 class="section-header"><i class="fas fa-gift"></i> 禮盒專區</h2>
        <div class="grid" id="g-boxes" style="margin-bottom: 50px;"></div>

        <h2 class="section-header"><i class="fas fa-bread-slice"></i> 單點專區</h2>
        
        <h3 class="title">人氣泡芙系列</h3><div class="grid" id="g1"></div>
        <h3 class="title">精緻甜點與可頌</h3><div class="grid" id="g2"></div>
        <h3 class="title">咖啡系列</h3><div class="grid" id="g3"></div>

        <div class="cart" id="cart">
            <h2 style="margin-top:0;"><i class="fas fa-shopping-basket"></i> 我的預訂清單</h2>
            <div id="cart-list" style="margin-bottom: 20px; color: #888;">購物車目前是空的。</div>
            <div style="text-align:right; font-size:1.6rem; font-weight:bold; color:var(--s); margin-bottom: 20px;">
                總計 NT$ <span id="total">0</span>
            </div>
            
            <hr style="border:0; border-top:1px solid #eee; margin:20px 0;">
            
            <div>
                <label class="form-label">取餐日期：</label>
                <input type="date" id="order-date" class="input">
                
                <label class="form-label">取餐時段：</label>
                <select id="time-select" class="input">
                    <option value="">請選擇時段...</option>
                    <option value="13:00 - 14:00">13:00 - 14:00</option>
                    <option value="14:00 - 15:00">14:00 - 15:00</option>
                    <option value="15:00 - 16:00">15:00 - 16:00</option>
                    <option value="16:00 - 17:00">16:00 - 17:00</option>
                    <option value="17:00 - 18:00">17:00 - 18:00</option>
                    <option value="18:00 - 19:00">18:00 - 19:00</option>
                </select>

                <label class="form-label">訂購人姓名：</label>
                <input type="text" id="user" class="input" placeholder="請輸入姓名">
                
                <label class="form-label">聯絡電話 (10碼數字)：</label>
                <input type="tel" id="tel" class="input" placeholder="例如：0912345678" maxlength="10">
                
                <button class="line-btn" onclick="submitOrder()">
                    <i class="fab fa-line"></i> 送出訂單至 LINE
                </button>
            </div>
        </div>
    </div>

    <div class="footer">
        系統版本：20260312_V2 &copy; Butter Roo 奶油袋鼠漢口店
    </div>

    <script>
        // --- 1. 資料庫區域 ---
        
        // 禮盒設定 (您可在此更改價格)
        const giftBoxes = [
            { id: 'box4', name: '四入精緻禮盒', size: 4, price: 320, img: 'https://via.placeholder.com/300x200/FFB74D/ffffff?text=4+Pack+Gift+Box' },
            { id: 'box6', name: '六入豪華禮盒', size: 6, price: 480, img: 'https://via.placeholder.com/300x200/E65100/ffffff?text=6+Pack+Gift+Box' }
        ];

        // 單點商品設定 (完整的 21 項)
        const products = [
            { c: 1, n: "生乳卡士達", p: 60, i: "1.jpg" }, { c: 1, n: "草莓卡士達", p: 95, i: "2.jpg" }, { c: 1, n: "法芙娜可可", p: 70, i: "3.jpg" }, { c: 1, n: "白葡萄卡士達", p: 90, i: "4.jpg" }, { c: 1, n: "靜岡濃抹茶", p: 75, i: "5.jpg" }, { c: 1, n: "砂糖橘卡士達", p: 85, i: "6.jpg" }, { c: 1, n: "酪梨尬布丁", p: 90, i: "7.jpg" }, { c: 1, n: "mini小泡芙 (招牌)", p: 150, i: "8.jpg" }, { c: 1, n: "mini小泡芙 (日式)", p: 140, i: "9.jpg" },
            { c: 2, n: "提拉米蘇", p: 120, i: "10.jpg" }, { c: 2, n: "雲朵山竹", p: 110, i: "11.jpg" }, { c: 2, n: "重乳酪炙燒起司", p: 100, i: "12.jpg" }, { c: 2, n: "貓山王榴槤", p: 120, i: "13.jpg" }, { c: 2, n: "酸甜檸檬乳酪", p: 95, i: "14.jpg" }, { c: 2, n: "肉鬆鹹蛋黃乳酪", p: 90, i: "15.jpg" }, { c: 2, n: "酸溜溜檸檬", p: 85, i: "16.jpg" }, { c: 2, n: "蜜糖可頌", p: 55, i: "17.jpg" }, { c: 2, n: "蛋塔可頌", p: 65, i: "18.jpg" },
            { c: 3, n: "美式咖啡 (冰/熱)", p: 65, i: "19.jpg" }, { c: 3, n: "拿鐵咖啡 (冰/熱)", p: 85, i: "20.jpg" }, { c: 3, n: "阿芙佳朵 (冰)", p: 110, i: "21.jpg" }
        ];

        let cart = [];

        // --- 2. 渲染邏輯 ---

        // 渲染禮盒專區
        function renderGiftBoxes() {
            // 自動篩選出屬於「泡芙」(c: 1) 的商品，作為禮盒選項
            const puffs = products.filter(p => p.c === 1);
            let puffOptions = puffs.map(p => `<option value="${p.n}">${p.n}</option>`).join('');
            
            const container = document.getElementById('g-boxes');
            let html = '';
            
            giftBoxes.forEach(box => {
                let selectsHtml = '';
                // 根據禮盒大小(size)，產生對應數量的下拉選單
                for(let i = 1; i <= box.size; i++) {
                    selectsHtml += `<select id="${box.id}-flavor-${i}" class="box-select">
                        <option value="" disabled selected>👉 選擇第 ${i} 顆口味</option>
                        ${puffOptions}
                    </select>`;
                }

                html += `
                <div class="card gift-card">
                    <img src="${box.img}" class="img">
                    <div class="info">
                        <div style="font-weight:bold; font-size:1.3rem; margin-bottom:5px; color:var(--s);">${box.name}</div>
                        <div style="font-weight:bold; font-size:1.1rem; margin-bottom:15px;">NT$ ${box.price}</div>
                        
                        <div style="background: #FFF3E0; padding: 10px; border-radius: 8px; margin-bottom: 10px;">
                            <div style="margin-bottom: 8px; font-size: 0.9rem; font-weight:bold; color: #E65100;">請挑選 ${box.size} 顆口味：</div>
                            ${selectsHtml}
                        </div>

                        <div class="action-row">
                            <input type="number" id="${box.id}-qty" class="qty-input" value="1" min="1">
                            <button class="add-btn" onclick="addBoxToCart('${box.id}')"><i class="fas fa-gift"></i> 加入訂單</button>
                        </div>
                    </div>
                </div>`;
            });
            container.innerHTML = html;
        }

        // 渲染單點專區
        function renderProducts() {
            products.forEach((d, idx) => {
                const g = document.getElementById('g' + d.c);
                if(g) {
                    g.innerHTML += `
                        <div class="card">
                            <img src="${d.i}" class="img" onerror="this.src='https://via.placeholder.com/300x200?text=ButterRoo'">
                            <div class="info">
                                <div style="font-weight:bold; font-size:1.1rem; margin-bottom:5px;">${d.n}</div>
                                <div style="color:var(--s); font-weight:bold; font-size:1.1rem; margin-bottom:15px;">NT$ ${d.p}</div>
                                <div class="action-row">
                                    <input type="number" id="qty-${idx}" class="qty-input" value="1" min="1">
                                    <button class="add-btn" onclick="addToCart(${idx})">加入訂單</button>
                                </div>
                            </div>
                        </div>`;
                }
            });
        }

        // --- 3. 購物車邏輯 ---

        // 將禮盒加入購物車
        function addBoxToCart(boxId) {
            const box = giftBoxes.find(b => b.id === boxId);
            let flavors = [];
            
            // 檢查是否每顆都有選到口味
            for(let i = 1; i <= box.size; i++) {
                let val = document.getElementById(`${box.id}-flavor-${i}`).value;
                if(!val) {
                    alert(`請完整選擇 ${box.name} 的 ${box.size} 顆口味喔！ (您還有漏選的)`);
                    return;
                }
                flavors.push(val);
            }
            
            let qty = parseInt(document.getElementById(`${box.id}-qty`).value);
            if(isNaN(qty) || qty < 1) qty = 1;

            // 統計口味數量 (把 生乳, 生乳, 草莓 變成 -> 生乳x2, 草莓x1)
            let flavorCounts = {};
            flavors.forEach(f => flavorCounts[f] = (flavorCounts[f] || 0) + 1);
            let detailStr = Object.keys(flavorCounts).map(k => `${k}x${flavorCounts[k]}`).join(', ');

            // 產生專屬的購物車名稱
            let cartName = `🎁 ${box.name} (${detailStr})`;

            const existingItem = cart.find(x => x.n === cartName);
            if(existingItem) {
                existingItem.q += qty;
            } else {
                cart.push({ n: cartName, p: box.price, q: qty });
            }
            
            updateCartDisplay();
            
            // 重置數量與選項
            document.getElementById(`${box.id}-qty`).value = 1;
            for(let i = 1; i <= box.size; i++) {
                document.getElementById(`${box.id}-flavor-${i}`).selectedIndex = 0;
            }
            alert(`已將 ${box.name} 加入清單！`);
        }

        // 將單點加入購物車
        function addToCart(idx) {
            const item = products[idx];
            let inputQty = parseInt(document.getElementById(`qty-${idx}`).value);
            if (isNaN(inputQty) || inputQty < 1) inputQty = 1;

            const existingItem = cart.find(x => x.n === item.n);
            if(existingItem) {
                existingItem.q += inputQty;
            } else {
                cart.push({ n: item.n, p: item.p, q: inputQty });
            }
            
            updateCartDisplay();
            document.getElementById(`qty-${idx}`).value = 1; 
        }

        function updateCartDisplay() {
            const list = document.getElementById('cart-list');
            if(cart.length === 0) { 
                list.innerHTML = "<span style='color:#888;'>購物車目前是空的。</span>"; 
                document.getElementById('total').innerText = "0"; 
                return; 
            }
            
            list.innerHTML = cart.map((x, i) => `
                <div style="display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px dashed #eee;">
                    <span style="font-size:1.1rem; flex-grow:1;">${x.n} <b style="color:var(--s); margin-left:10px; white-space:nowrap;">x ${x.q}</b></span>
                    <span style="font-weight:bold; white-space:nowrap; margin-left:15px;">$${x.p * x.q} <i class="fas fa-trash-alt" onclick="removeItem(${i})" style="color:#ccc; cursor:pointer; margin-left:10px; font-size:1.2rem;"></i></span>
                </div>`).join('');
                
            document.getElementById('total').innerText = cart.reduce((sum, x) => sum + (x.p * x.q), 0);
        }

        function removeItem(i) {
            cart.splice(i, 1);
            updateCartDisplay();
        }

        // --- 4. 送出訂單邏輯 ---
        function submitOrder() {
            const date = document.getElementById('order-date').value;
            const time = document.getElementById('time-select').value;
            const name = document.getElementById('user').value.trim();
            const phone = document.getElementById('tel').value.trim();
            
            if (cart.length === 0) {
                alert("請先選購商品再送出訂單喔！");
                return;
            }

            if (!date || !time) {
                alert("請選擇取餐日期與時段。");
                return;
            }

            const phoneRegex = /^[0-9]{10}$/;
            if (!name || !phoneRegex.test(phone)) {
                alert("請填入完整聯絡資訊 (包含10碼電話數字)");
                return;
            }

            let msg = `【Butter Roo 預訂訂單】\n👤 姓名：${name}\n📞 電話：${phone}\n📅 取餐：${date} (${time})\n\n-- 訂購明細 --\n`;
            cart.forEach(x => {
                msg += `▪️ ${x.n} x ${x.q}\n`;
            });
            msg += `\n💰 總金額：NT$ ${document.getElementById('total').innerText}\n\n(請確認是否有現貨並回覆)`;
            
            window.location.href = `https://line.me/R/oaMessage/@069pytqk/?${encodeURIComponent(msg)}`;
        }

        // 確保網頁載入後才執行設定
        window.onload = () => {
            renderGiftBoxes(); // 先渲染禮盒
            renderProducts();  // 再渲染單點
            
            // 安全地設定今日日期
            const todayStr = new Date().toISOString().split('T')[0];
            const dateInput = document.getElementById('order-date');
            if (dateInput) {
                dateInput.value = todayStr;
                dateInput.min = todayStr;
            }
        };
    </script>
</body>
</html>
